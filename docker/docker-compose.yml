services:
  surrealdb:
    image: surrealdb/surrealdb:v3.2.1
    command: ["start", "--log", "warn", "--user", "root", "--pass", "root", "rocksdb:/data/fvb.db"]
    environment:
      SURREAL_HTTP_MAX_SQL_BODY_SIZE: 64MiB
    ports:
      - "8000:8000"
    volumes:
      - surreal-data:/data
    mem_limit: 48g

  postgres:
    image: pgvector/pgvector:pg17
    command: ["postgres", "-c", "synchronous_commit=on", "-c", "listen_addresses=*"]
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    mem_limit: 48g

volumes:
  surreal-data:
  postgres-data:


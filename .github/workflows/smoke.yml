name: smoke

on:
  push:
  pull_request:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install PostgreSQL 17 and pgvector
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common curl
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get update
          sudo apt-get install -y postgresql-17 postgresql-17-pgvector
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
      - name: Download and verify SurrealDB
        run: |
          version=v3.2.1
          archive="surreal-${version}.linux-amd64.tgz"
          base="https://download.surrealdb.com/${version}"
          curl --fail --location --retry 3 -o "$archive" "$base/$archive"
          echo "7036eafd9ba07c3720d25a3201f780b81ec82eb2b4dcb56c9ea81b87655644e7  $archive" | sha256sum --check
          tar -xzf "$archive"
          chmod +x surreal
      - name: Configure local engine smoke run
        run: |
          sudo systemctl stop postgresql || true
          uv sync
          uv run python - <<'PY'
          from pathlib import Path
          import yaml
          source = Path("configs/smoke.yaml")
          config = yaml.safe_load(source.read_text())
          config["engines"]["surrealdb"] = {"mode": "binary", "binary": str(Path("surreal").resolve())}
          config["engines"]["postgres"] = {"mode": "local"}
          Path("configs/ci-smoke.yaml").write_text(yaml.safe_dump(config, sort_keys=False))
          PY
      - name: Run both engines and render report
        run: |
          uv run python scripts/run.py --config configs/ci-smoke.yaml --engine all --out results/ci-smoke
          uv run python scripts/report.py --results results/ci-smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: filtered-vector-smoke
          path: results/ci-smoke
          if-no-files-found: warn
